name: medical_transcriber
description: Cross-platform medical lecture transcription app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  http: ^1.2.2
  flutter_riverpod: ^2.5.1
  file_picker: ^8.1.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  percent_indicator: ^4.2.3
  shared_preferences: ^2.3.2
  path: ^1.9.0
  uuid: ^4.4.2
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
