name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release --dart-define=API_BASE_URL=https://medical-transcriber-api-allowedorigins.up.railway.app/api/v1
      - uses: actions/upload-artifact@v4
        with:
          name: medical-transcriber-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
